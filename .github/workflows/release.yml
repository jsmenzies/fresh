name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Automation
    if: ${{ github.ref_type == 'branch' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Analyze Commits and Create Release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Config and manifest files in release/ directory
          config-file: release/release-please-config.json
          manifest-file: release/.release-please-manifest.json

  release:
    name: Build and Release
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag points to main history
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean -f release/.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          BUILT_BY: ${{ github.actor }}
